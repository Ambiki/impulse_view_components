name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint_js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
          cache: "yarn"
      - name: Run ESLint
        run: |
          yarn install --frozen-lockfile
          yarn lint

  lint_ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler: default
          bundler-cache: true
          rubygems: latest
      - name: Run rubocop
        run: ./bin/rubocop

  test_system:
    needs:
      - lint_js
      - lint_ruby
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.ruby == '4.0' }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        gemfile:
          - rails_6_1
          - rails_7
          - rails_7_1
          - rails_8
        exclude:
          # Rails 6.1 / 7.0 do not support Ruby 3.4+
          - { ruby: "3.4", gemfile: rails_6_1 }
          - { ruby: "4.0", gemfile: rails_6_1 }
          - { ruby: "3.4", gemfile: rails_7 }
          - { ruby: "4.0", gemfile: rails_7 }
          # Keep Ruby 4.0 limited to the newest Rails only
          - { ruby: "4.0", gemfile: rails_7_1 }
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
      BUNDLE_PATH_RELATIVE_TO_CWD: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".tool-versions"
          cache: "yarn"
      - run: |
          yarn install --frozen-lockfile
          yarn build
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: default
          bundler-cache: true
          rubygems: latest
      - name: Run test
        run: bundle exec rake test:system
      - uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          path: |
            /home/runner/work/view_components/view_components/demo/tmp/capybara/
          if-no-files-found: ignore
          retention-days: 7
          overwrite: true

  test_components:
    needs:
      - lint_js
      - lint_ruby
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.ruby == '4.0' }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
        gemfile:
          - rails_6_1
          - rails_7
          - rails_7_1
          - rails_8
        exclude:
          # Rails 6.1 / 7.0 do not support Ruby 3.4+
          - { ruby: "3.4", gemfile: rails_6_1 }
          - { ruby: "4.0", gemfile: rails_6_1 }
          - { ruby: "3.4", gemfile: rails_7 }
          - { ruby: "4.0", gemfile: rails_7 }
          # Keep Ruby 4.0 limited to the newest Rails only
          - { ruby: "4.0", gemfile: rails_7_1 }
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/gemfiles/${{ matrix.gemfile }}.gemfile
      BUNDLE_PATH_RELATIVE_TO_CWD: true
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: default
          bundler-cache: true
          rubygems: latest
      - name: Run test
        run: bundle exec rake test:components
